<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>CPS Login - AMR Edge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4">🔐 Autentificare CPS</h3>
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">ID Operator (Badge)</label>
            <input type="text" id="operatorId" class="form-control" placeholder="ex: OP-402" required>
        </div>
        <div class="mb-3">
            <label class="form-label">PIN Securitate</label>
            <input type="password" id="pinCode" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Conectare la AMR</button>
    </form>
    <div id="errorMsg" class="text-danger mt-3 text-center" style="display: none;">Acces interzis. Verificați datele.</div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const opId = document.getElementById('operatorId').value;
        const pin = document.getElementById('pinCode').value;

        // Simulare validare pe Edge (În producție se face fetch către un endpoint de auth)
        if(opId.length > 2 && pin === "1234") {
            sessionStorage.setItem("cps_auth_token", "dummy_jwt_token_valid");
            sessionStorage.setItem("operator", opId);
            window.location.href = "/monitor";
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    });
</script>
</body>
</html>
